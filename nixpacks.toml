[phases.setup]
nixPkgs = ["nodejs_latest"]

[phases.install]
cmd = "npm ci"

[phases.build]
cmd = "npm run build"

[start]
cmd = "npm start"

# ---------------------------------------------------------------------------
# Required environment variables — set these in Railway's Variables tab
# BEFORE deploying. VITE_ vars are baked into the bundle at build time by
# Vite, so they must be present when `npm run build` runs.
# ---------------------------------------------------------------------------
# VITE_SUPABASE_URL=https://your-project-ref.supabase.co
# VITE_SUPABASE_ANON_KEY=your-anon-public-key